<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Portfolio</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 40px;
    }

    h2 {
      margin-bottom: 20px;
    }

    .section {
      background: white;
      padding: 30px;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .projects-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      width: 300px;
      padding: 15px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .card h3 {
      margin: 10px 0;
    }

    .card p {
      font-size: 14px;
      color: #555;
    }

    .card button {
      margin-top: 10px;
      padding: 8px 15px;
      border: 1px solid #333;
      background: white;
      cursor: pointer;
      border-radius: 5px;
      transition: 0.3s;
    }

    .card button:hover {
      background: #333;
      color: white;
    }
  </style>
</head>

<body>

  <div class="section">
    <h2>My Projects</h2>

    <div class="projects-container">

      <div class="card">
        <img src="https://via.placeholder.com/300x150" alt="Portfolio">
        <h3>Portfolio Website</h3>
        <p>A personal site built with HTML/CSS.</p>
        <button>View Project</button>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/300x150" alt="Weather App">
        <h3>Weather App</h3>
        <p>A React app that fetches live weather data from an API.</p>
        <button>View Project</button>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/300x150" alt="E-commerce">
        <h3>E-commerce Platform</h3>
        <p>A full-stack shop with cart, user auth, and payment integration.</p>
        <button>View Project</button>
      </div>

    </div>
  </div>

  <div class="section">
    <h2>My Frontend Journey</h2>
    <p>Day 1: Setup & Deployment (Completed)</p>
  </div>

</body>
</html>
