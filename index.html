<!DOCTYPE html>
<html>
<head>
  <title>My Portfolio</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #f3f4f6;
      padding: 60px;
      margin: 0;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 30px;
    }

    .projects {
      display: flex;
      gap: 25px;
      margin-bottom: 60px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      width: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      transition: 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .card h3 {
      margin: 0 0 10px 0;
      font-size: 20px;
    }

    .card p {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .card button {
      padding: 8px 16px;
      border: 1px solid #d1d5db;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .card button:hover {
      background: #111827;
      color: white;
      border-color: #111827;
    }

    .journey {
      background: white;
      padding: 30px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
    }

    .journey p {
      color: #374151;
    }

  </style>
</head>

<body>

  <div class="container">

    <h2>My Projects</h2>

    <div class="projects">

      <div class="card">
        <img src="https://via.placeholder.com/300x140">
        <h3>Portfolio Website</h3>
        <p>A personal site built with HTML/CSS.</p>
        <button>View Project</button>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/300x140">
        <h3>Weather App</h3>
        <p>A React app that fetches live weather data from an API.</p>
        <button>View Project</button>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/300x140">
        <h3>E-commerce Platform</h3>
        <p>A full-stack shop with cart, user auth, and payment integration.</p>
        <button>View Project</button>
      </div>

    </div>

    <div class="journey">
      <h2>My Frontend Journey</h2>
      <p>Day 1: Setup & Deployment (Completed)</p>
    </div>

  </div>

</body>
</html>
