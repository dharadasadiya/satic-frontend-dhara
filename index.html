<!DOCTYPE html>
<html>
<head>
  <title>My Portfolio</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 60px 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 30px;
    }

    /* Projects Layout */
    .projects {
      display: flex;
      gap: 25px;
      margin-bottom: 60px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 25px;
      width: 320px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      transition: 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 18px;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .card p {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 18px;
    }

    /* Button Component */
    .btn {
      padding: 9px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #d1d5db;
      background: white;
      transition: 0.2s;
    }

    .btn:hover {
      background: #111827;
      color: white;
      border-color: #111827;
    }

    /* Journey Section */
    .journey {
      background: white;
      border: 1px solid #e5e7eb;
      padding: 30px;
      border-radius: 12px;
    }

    .journey p {
      color: #374151;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .projects {
        justify-content: center;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <h2>My Projects</h2>

    <div class="projects">

      <div class="card">
        <img src="https://via.placeholder.com/320x150" alt="Portfolio">
        <h3>Portfolio Website</h3>
        <p>A personal site built with HTML/CSS.</p>
        <button class="btn">View Project</button>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/320x150" alt="Weather App">
        <h3>Weather App</h3>
        <p>A React app that fetches live weather data from an API.</p>
        <button class="btn">View Project</button>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/320x150" alt="E-commerce">
        <h3>E-commerce Platform</h3>
        <p>A full-stack shop with cart, user auth, and payment integration.</p>
        <button class="btn">View Project</button>
      </div>

    </div>

    <div class="journey">
      <h2>My Frontend Journey</h2>
      <p>Day 1: Setup & Deployment (Completed)</p>
    </div>

  </div>

</body>
</html>
