<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Internship Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- LEFT SIDE PROJECTS -->
  <div class="projects">
    <h2>My Projects</h2>

    <div class="project-grid">

      <div class="card">
        <img src="images/p1.jpg" alt="Project 1">
        <p>Project 1</p>
      </div>

      <div class="card">
        <img src="images/p2.jpg" alt="Project 2">
        <p>Project 2</p>
      </div>

      <div class="card">
        <img src="images/p3.jpg" alt="Project 3">
        <p>Project 3</p>
      </div>

      <div class="card">
        <img src="images/p4.jpg" alt="Project 4">
        <p>Project 4</p>
      </div>

      <div class="card">
        <img src="images/p5.jpg" alt="Project 5">
        <p>Project 5</p>
      </div>

      <div class="card">
        <img src="images/p6.jpg" alt="Project 6">
        <p>Project 6</p>
      </div>

    </div>
  </div>

  <!-- RIGHT SIDE CONTACT FORM -->
  <div class="contact-box">
    <h2>Contact Me</h2>

    <form id="contactForm" novalidate>

      <label for="name">Name:</label>
      <input type="text" id="name">
      <span class="error" id="nameError"></span>

      <label for="email">Email:</label>
      <input type="email" id="email">
      <span class="error" id="emailError"></span>

      <label for="message">Message:</label>
      <textarea id="message"></textarea>
      <span class="error" id="messageError"></span>

      <button id="submitBtn" disabled>Send Message</button>

    </form>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
